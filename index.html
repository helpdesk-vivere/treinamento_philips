<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<title>Dashboard Treinamento Philips</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Segoe UI;
background:#f4f7fb;
margin:0;
}

.header{
background:#0f5c74;
color:white;
padding:20px;
text-align:center;
}

.container{
max-width:1200px;
margin:auto;
padding:25px;
}

.kpis{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
text-align:center;
}

.numero{
font-size:28px;
font-weight:bold;
margin-top:5px;
}

.table-box{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
margin-bottom:30px;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#1f6f8b;
color:white;
padding:10px;
text-align:left;
}

td{
padding:10px;
border-bottom:1px solid #eee;
}

.progress{
height:10px;
background:#e5e5e5;
border-radius:5px;
overflow:hidden;
}

.bar{
height:100%;
background:#28a745;
width:0%;
}

</style>

</head>

<body>

<div class="header">
<h2>Dashboard Treinamento Philips</h2>
</div>

<div class="container">

<div class="kpis">

<div class="card">
Total de Atividades
<div class="numero" id="total">0</div>
</div>

<div class="card">
Progresso Médio
<div class="numero" id="media">0%</div>
</div>

<div class="card">
Concluídas
<div class="numero" id="concluidas">0</div>
</div>

</div>

<div class="table-box">

<table>

<thead>

<tr>
<th>Descrição</th>
<th>Progresso</th>
<th>Observação</th>
</tr>

</thead>

<tbody id="tabela">

</tbody>

</table>

</div>

<canvas id="grafico"></canvas>

</div>

<script>

const URL="https://script.google.com/macros/s/AKfycbzjCviMj0nCnVAeMB_lMf_QrEp-1QnW0LrsUtu1UwFg7fVKJw0Xqk_aEKVf2gpYf8cyMA/exec";

let grafico;

async function carregar(){

let resposta=await fetch(URL);
let dados=await resposta.json();

let tabela=document.getElementById("tabela");

tabela.innerHTML="";

let total=0;
let soma=0;
let concluidas=0;

dados.forEach(linha=>{

let progresso=parseFloat(linha.progresso)||0;

if(progresso<=1) progresso*=100;

progresso=Math.round(progresso);

total++;
soma+=progresso;

if(progresso==100) concluidas++;

let tr=document.createElement("tr");

tr.innerHTML=`

<td>${linha.descricao}</td>

<td>

${progresso}%

<div class="progress">
<div class="bar" style="width:${progresso}%"></div>
</div>

</td>

<td>${linha.observacao || ""}</td>

`;

tabela.appendChild(tr);

});

let media=Math.round(soma/total);

document.getElementById("total").innerText=total;
document.getElementById("media").innerText=media+"%";
document.getElementById("concluidas").innerText=concluidas;

if(grafico) grafico.destroy();

grafico=new Chart(document.getElementById("grafico"),{

type:"doughnut",

data:{
labels:["Concluídas","Pendentes"],
datasets:[{
data:[concluidas,total-concluidas],
backgroundColor:["#28a745","#ffc107"]
}]
},

options:{
plugins:{legend:{position:"bottom"}}
}

});

}

carregar();

setInterval(carregar,30000);

</script>

</body>
</html>
